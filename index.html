<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>在庫管理</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #87cefa; /* 水色背景 */
        margin: 0;
      }
      .main {
        max-width: 400px;
        background-color: #fff; /* 背景を白に */
        margin: 0 auto;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        padding-bottom: 30px;
        position: relative;
        min-height: 500px;
      }
      .header {
        display: flex;
        cursor: pointer;
      }
      .header-left {
        background-color: #66ccff;
        flex: 1;
        padding: 10px;
        font-weight: bold;
        font-size: 1.5rem;
        text-align: center;
        transition: background 0.2s;
      }
      .header-right {
        background-color: #ffd700;
        flex: 1;
        padding: 10px;
        font-weight: bold;
        font-size: 1.5rem;
        text-align: center;
        transition: background 0.2s;
      }
      .header-active {
        background-color: #ffa500 !important; /* オレンジ */
        color: #fff;
      }
      .item-controls {
        display: flex;
        align-items: center;
        gap: 5px;
        margin-bottom: 10px;
      }
      .search-box {
        margin: 10px;
      }
      .add-button {
        position: absolute;
        bottom: 20px;
        right: 20px;
        background-color: #ff69b4;
        color: white;
        border-radius: 50%;
        width: 60px;
        height: 60px;
        font-size: 1rem;
        border: none;
      }
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }
      .orange-bg {
        background-color: #ffa500 !important;
        color: #fff;
        border-radius: 10px;
        padding-bottom: 30px;
        min-height: 400px;
      }
      .buy-done-btn {
        background-color: #2ECC71 !important;
        border-color: #2ECC71 !important;
        color: #fff !important;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <!-- ヘッダー -->
      <div class="header">
        <div id="tab-stock" class="header-left header-active">ストック</div>
        <div id="tab-buy" class="header-right">買うもの</div>
      </div>

      <!-- ストックタブ内容 -->
      <div id="stock-content" class="tab-content active">
        <!-- 検索 -->
        <div class="search-box">
          <input type="text" class="form-control" placeholder="検索" />
        </div>
        <!-- アイテムリスト -->
        <div class="px-3" id="stock-list">
          <!-- ここにJSでアイテムリストを描画 -->
        </div>
      </div>

      <!-- 買うものタブ内容 -->
      <div id="buy-content" class="tab-content ">
        <div class="px-3 pt-3">
          <div>・消しゴム</div>
          <div>・ノート</div>
          <div>・ボールペン</div>
          <div>・付箋</div>
        </div>
      </div>

      <!-- 追加ボタン -->
      <button class="add-button">追加</button>
    </div>
    <script>
      // アイテムデータ（例）
      const stockItems = [
        { name: "シャー芯 B", furigana: "サ", count: 0 },
        { name: "シャー芯 HB", furigana: "サ", count: 0 },
        { name: "ノリ", furigana: "ナ", count: 3 },
        { name: "名前ペン", furigana: "ナ", count: 2},
        { name: "ルーズリーフ", furigana: "ラ", count: 3 }
      ];

      // アイテムリストを描画する関数
      function renderStockList() {
        const container = document.getElementById("stock-list");
        container.innerHTML = "";
        let currentFurigana = "";

        // 買うものリストの要素を取得し、初期化
        const buyContentDiv = document.querySelector("#buy-content .px-3.pt-3");
        buyContentDiv.innerHTML = "";

        stockItems.forEach((item, idx) => {
          if (item.furigana !== currentFurigana) {
            currentFurigana = item.furigana;
            container.innerHTML += `<div>${currentFurigana}</div>`;
          }
          container.innerHTML += `
            <div class="item-controls">
              ・${item.name} <span class="badge bg-light text-dark">×${item.count}</span>
              <button class="btn btn-danger btn-sm plus-btn" data-index="${idx}">＋</button>
              <button class="btn btn-primary btn-sm">－</button>
            </div>
          `;

          if (item.count === 0) {
            buyContentDiv.innerHTML += `
              <div style="display:flex;align-items:center;gap:5px;">
                ・${item.name}
                <button class="btn btn-success btn-sm buy-done-btn" data-index="${idx}">買った</button>
              </div>
            `;
          }
        });

        // 「＋」ボタンのイベントリスナーを追加
        document.querySelectorAll('.plus-btn').forEach(btn => {
          btn.addEventListener('click', function() {
            const idx = this.getAttribute('data-index');
            stockItems[idx].count += 1;
            renderStockList();
          });
        });

        // 「－」ボタンのイベントリスナーを追加
        document.querySelectorAll('.btn-primary').forEach((btn, i) => {
          btn.addEventListener('click', function() {
            const idx = this.previousElementSibling.getAttribute('data-index');
            if (stockItems[idx].count > 0) {
              stockItems[idx].count -= 1;
              renderStockList();
            }
          });
        });

        // 「買った」ボタンのイベントリスナーを追加
        document.querySelectorAll('.buy-done-btn').forEach(btn => {
          btn.addEventListener('click', function() {
            const idx = this.getAttribute('data-index');
            stockItems[idx].count = 1;
            renderStockList();
          });
        });
      }

      // 初期表示
      renderStockList();

      // タブ要素とコンテンツ要素を取得
      const tabStock = document.getElementById("tab-stock");
      const tabBuy = document.getElementById("tab-buy");
      const stockContent = document.getElementById("stock-content");
      const buyContent = document.getElementById("buy-content");

      // 「ストック」タブをクリックしたときの処理
      tabStock.addEventListener("click", () => {
        tabStock.classList.add("header-active");      // ストックタブをアクティブに
        tabBuy.classList.remove("header-active");     // 買うものタブのアクティブを外す
        stockContent.classList.add("active");         // ストック内容を表示
        buyContent.classList.remove("active");        // 買うもの内容を非表示
      });

      // 「買うもの」タブをクリックしたときの処理
      tabBuy.addEventListener("click", () => {
        tabBuy.classList.add("header-active");        // 買うものタブをアクティブに
        tabStock.classList.remove("header-active");   // ストックタブのアクティブを外す
        buyContent.classList.add("active");           // 買うもの内容を表示
        stockContent.classList.remove("active");      // ストック内容を非表示
      });
    </script>
  </body>
</html>
